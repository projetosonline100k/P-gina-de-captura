    <script>
      const STORAGE_KEY = "quizlab_quizzes_v3";
      const SUBMISSIONS_KEY = "quizlab_submissions_v1";
      const FUNNEL_KEY = "quizlab_funnel_v1";
      const SUPABASE_URL = "https://iofaapgqxixcvgxizjyu.supabase.co";
      const SUPABASE_KEY = "sb_publishable_3PLbdXuIHwBmQDA0gMbqdw_ZfBTT1a1";

      const defaultQuiz = {
        id: "viagem-inteligente",
        slug: "viagem-cabe-no-bolso",

        subtitle: "Responda 5 perguntas rápidas e receba seu diagnóstico de viagem personalizado e seu perfil de Viajante.",

        ctaLabel: "Quero organizar minha viagem agora",
        leadTitle: "Para liberar seu resultado",

        purchaseUrl: "https://pay.kiwify.com.br/SLuCcgS",
        theme: "#0f766e",
        questions: [
          {
            text: "Qual dessas frases mais parece com você hoje?",

              { text: "Eu sei planejar, só falta decidir a data", profile: "pronto", weight: 3 }
            ]
          },

            options: [
              { text: "🏖 Praia paradisíaca (Maldivas, Fernando de Noronha, Caribe)", profile: "pronto", weight: 2 },
              { text: "🏙 Uma capital internacional (Nova York, Paris, Tóquio)", profile: "organizando", weight: 2 },
              { text: "⛰ Natureza e aventura (Patagônia, Bariloche, Chapada)", profile: "organizando", weight: 2 },
              { text: "🎉 Destino com balada e vida noturna (Miami, Cancún, Ibiza)", profile: "pronto", weight: 1 }
            ]
          },
          {
            text: "Você já tentou se organizar financeiramente pra viajar antes?",
            options: [
              { text: "Já usei planilha/app, mas não consegui manter", profile: "travado", weight: 3 },
              { text: "Nunca tentei nenhum método, sempre foi na conta do padeiro", profile: "travado", weight: 3 },
              { text: "Tenho um jeito de me organizar, mas é manual e trabalhoso", profile: "organizando", weight: 2 },
              { text: "Não, porque não sabia que existia algo assim", profile: "travado", weight: 2 }
            ]
          },
          {
            text: "Se você soubesse EXATAMENTE quanto precisa guardar por mês pra essa viagem sair do papel, você faria esse esforço?",
            options: [
              { text: "Com certeza, só preciso saber o número", profile: "pronto", weight: 3 },
              { text: "Provavelmente sim", profile: "organizando", weight: 2 },
              { text: "Não sei se conseguiria me organizar sozinho(a)", profile: "travado", weight: 2 }
            ]
          }
        ],
        results: [
          {
            profile: "travado",
            title: "Sonhador(a) Travado",
            text: "Sua viagem é possível. Mas hoje ela está travada não pela falta de dinheiro, e sim pela falta de um plano claro de quanto guardar e até quando. Além disso, com base nos seus dados, essa viagem pode continuar sendo só um sonho por mais 1 a 2 anos.",
            bullets: [
              "O cálculo de quanto você precisa guardar por mês pra qualquer destino e data.",
              "Mostra sua evolução de economia em tempo real.",
              "Alerta quando você está fora da meta.",
              "Organiza os gastos da viagem (passagem, hospedagem, extras)."
            ]
          },
          {
            profile: "organizando",
            title: "Viajante em Organização",
            text: "Você já tem vontade e até alguma noção do caminho, mas ainda falta um método simples para transformar a viagem em meta com data marcada.",
            bullets: [
              "Meta de economia mensal com destino e prazo.",
              "Clareza sobre o custo total antes de comprar.",
              "Organização visual para manter constância.",
              "Plano simples para não depender de memória."
            ]
          },
          {
            profile: "pronto",
            title: "Viajante Pronto(a)",
            text: "Você está muito perto de tirar a viagem do papel. O que falta agora é colocar números, datas e acompanhamento para comprar com mais segurança.",
            bullets: [
              "Cálculo mensal para decidir rápido.",
              "Organização de gastos antes da compra.",
              "Acompanhamento da meta até a data da viagem.",
              "Menos dúvida e mais ação."
            ]
          }
        ]
      };

      const state = {
        quizzes: loadQuizzes(),
        submissions: loadSubmissions(),
        funnel: loadFunnel(),
        activeId: null,
        adminTab: "home",
        adminStage: 0,
        builderView: "flow",
        adminResultIndex: 0,
        selectedComponentId: null,
        flowStage: "intro",
        previewStep: 0,
        loadingProgress: 0,
        answers: [],
        submittedThisRun: false,
        lead: { name: "", email: "", phone: "" },
        remoteLoaded: false,
        remoteLoading: false,
        remoteError: "",
        publicQuizLoads: {}
      };

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function loadQuizzes() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (Array.isArray(saved) && saved.length) return saved.map(normalizeQuiz);
        } catch (error) {}
        return [clone(defaultQuiz)];
      }

      function loadSubmissions() {
        try {
          const saved = JSON.parse(localStorage.getItem(SUBMISSIONS_KEY));
          if (Array.isArray(saved)) return saved;
        } catch (error) {}
        return [];
      }

      function loadFunnel() {
        try {
          const saved = JSON.parse(localStorage.getItem(FUNNEL_KEY));
          if (Array.isArray(saved)) return saved;
        } catch (error) {}
        return [];
      }

      function saveQuizzes() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.quizzes));
        scheduleQuizSync(activeQuiz());
      }

      let quizSyncTimer = null;

      function scheduleQuizSync(quiz) {
        if (!supabaseEnabled() || !quiz) return;
        window.clearTimeout(quizSyncTimer);
        quizSyncTimer = window.setTimeout(() => syncQuizDefinition(quiz), 450);
      }

      function syncQuizDefinition(quiz) {
        const clean = normalizeQuiz(quiz);
        return supabaseRequest("quiz_definitions", {
          method: "POST",
          prefer: "resolution=merge-duplicates",
          body: {
            slug: slugFor(clean),
            quiz_id: clean.id,
            config: clean,
            updated_at: new Date().toISOString()
          }
        }).catch(() => syncQuizDefinitionFallback(clean));
      }

      async function syncQuizDefinitionFallback(quiz) {
        const slug = slugFor(quiz);
        const id = `quiz-definition:${slug}`;
        try {
          await supabaseRequest(`quiz_submissions?id=eq.${encodeURIComponent(id)}`, { method: "DELETE" });
          await supabaseRequest("quiz_submissions", {
            method: "POST",
            body: {
              id,
              quiz_id: quiz.id,
              created_at: new Date().toISOString(),
              traveler_name: "",
              answers: quiz,
              result_profile: "__quiz_definition__",
              result_title: slug
            }
          });
          state.remoteError = "";
        } catch (error) {
          console.warn("Não foi possível publicar a configuração do quiz:", error);
          state.remoteError = "O quiz foi salvo neste navegador, mas não foi possível publicá-lo online.";
        }
      }

      async function loadRemotePublicQuiz(slug) {
        if (!supabaseEnabled() || !slug || state.publicQuizLoads[slug]) return;
        state.publicQuizLoads[slug] = "loading";
        try {
          let remoteQuiz = null;
          try {
            const rows = await supabaseRequest(`quiz_definitions?slug=eq.${encodeURIComponent(slug)}&select=config&limit=1`);
            remoteQuiz = rows?.[0]?.config || null;
          } catch (error) {
            const fallbackRows = await supabaseRequest(`quiz_submissions?result_profile=eq.__quiz_definition__&result_title=eq.${encodeURIComponent(slug)}&select=answers&limit=1`);
            remoteQuiz = fallbackRows?.[0]?.answers || null;
          }
          if (remoteQuiz) {
            const clean = normalizeQuiz(remoteQuiz);
            const index = state.quizzes.findIndex((quiz) => quiz.id === clean.id || slugFor(quiz) === slug);
            if (index >= 0) state.quizzes[index] = clean;
            else state.quizzes.push(clean);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.quizzes));
          }
          state.publicQuizLoads[slug] = "loaded";
        } catch (error) {
          console.warn("Não foi possível carregar a versão publicada do quiz:", error);
          state.publicQuizLoads[slug] = "error";
        } finally {
          render();
        }
      }

      function saveSubmissions() {
        localStorage.setItem(SUBMISSIONS_KEY, JSON.stringify(state.submissions));
      }

      function saveFunnel() {
        localStorage.setItem(FUNNEL_KEY, JSON.stringify(state.funnel));
      }

      function supabaseEnabled() {
        return SUPABASE_URL && SUPABASE_KEY;
      }

      async function supabaseRequest(path, options = {}) {
        if (!supabaseEnabled()) return null;
        const response = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
          method: options.method || "GET",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            ...(options.prefer ? { Prefer: options.prefer } : {})
          },
          body: options.body ? JSON.stringify(options.body) : undefined
        });
        if (!response.ok) {
          const detail = await response.text();
          throw new Error(detail || `Supabase retornou ${response.status}`);
        }
        if (response.status === 204) return null;
        return response.json();
      }

      function remoteSubmission(row) {
        return {
          id: row.id,
          quizId: row.quiz_id,
          createdAt: row.created_at,
          travelerName: row.traveler_name || "",
          answers: row.answers || [],
          resultProfile: row.result_profile,
          resultTitle: row.result_title
        };
      }

      function remoteFunnel(row) {
        return {
          sessionId: row.session_id,
          quizId: row.quiz_id,
          createdAt: row.created_at,
          updatedAt: row.updated_at,
          maxRank: row.max_rank,
          stage: row.stage
        };
      }

      function submissionPayload(submission) {
        return {
          id: submission.id,
          quiz_id: submission.quizId,
          created_at: submission.createdAt,
          traveler_name: submission.travelerName || "",
          answers: submission.answers,
          result_profile: submission.resultProfile,
          result_title: submission.resultTitle
        };
      }

      function submissionPayloadWithoutName(submission) {
        return {
          id: submission.id,
          quiz_id: submission.quizId,
          created_at: submission.createdAt,
          answers: submission.answers,
          result_profile: submission.resultProfile,
          result_title: submission.resultTitle
        };
      }

      function funnelPayload(record) {
        return {
          session_id: record.sessionId,
          quiz_id: record.quizId,
          created_at: record.createdAt,
          updated_at: record.updatedAt,
          max_rank: record.maxRank,
          stage: record.stage
        };
      }

      function mergeUnique(localItems, remoteItems, key) {
        const map = new Map();
        [...localItems, ...remoteItems].forEach((item) => map.set(item[key], item));
        return [...map.values()];
      }

      async function loadRemoteData() {
        if (!supabaseEnabled() || state.remoteLoading || state.remoteLoaded) return;
        state.remoteLoading = true;
        try {
          const [submissionRows, funnelRows] = await Promise.all([
            supabaseRequest("quiz_submissions?select=*&order=created_at.asc"),
            supabaseRequest("quiz_funnel?select=*&order=updated_at.asc")
          ]);
          state.submissions = (submissionRows || [])
            .filter((row) => row.result_profile !== "__quiz_definition__")
            .map(remoteSubmission);
          state.funnel = (funnelRows || []).map(remoteFunnel);
          state.remoteLoaded = true;
          state.remoteError = "";
          saveSubmissions();
          saveFunnel();
        } catch (error) {
          console.warn("Supabase ainda nao esta pronto:", error);
          state.remoteError = "Supabase ainda não conectado. Confira as tabelas e políticas.";
        } finally {
          state.remoteLoading = false;
          render();
        }
      }

      function syncSubmission(submission) {
        supabaseRequest("quiz_submissions", {
          method: "POST",
          prefer: "resolution=merge-duplicates",
          body: submissionPayload(submission)
        }).catch((error) => {
          console.warn("Nao foi possivel salvar resposta no Supabase:", error);
          if (String(error.message || error).includes("traveler_name")) {
            supabaseRequest("quiz_submissions", {
              method: "POST",
              prefer: "resolution=merge-duplicates",
              body: submissionPayloadWithoutName(submission)
            }).catch((fallbackError) => {
              console.warn("Nao foi possivel salvar resposta sem nome no Supabase:", fallbackError);
            });
            state.remoteError = "Respostas salvas sem nome. Falta criar a coluna traveler_name no Supabase.";
            return;
          }
          state.remoteError = "Resposta salva localmente. Supabase ainda não conectado.";
        });
      }

      function syncFunnel(record) {
        supabaseRequest("quiz_funnel", {
          method: "POST",
          prefer: "resolution=merge-duplicates",
          body: funnelPayload(record)
        }).catch((error) => {
          console.warn("Nao foi possivel salvar funil no Supabase:", error);
          state.remoteError = "Funil salvo localmente. Supabase ainda não conectado.";
        });
      }

      function deleteRemoteQuizData(quizId) {
        Promise.all([
          supabaseRequest(`quiz_submissions?quiz_id=eq.${encodeURIComponent(quizId)}`, { method: "DELETE" }),
          supabaseRequest(`quiz_funnel?quiz_id=eq.${encodeURIComponent(quizId)}`, { method: "DELETE" })
        ]).catch((error) => {
          console.warn("Nao foi possivel limpar dados no Supabase:", error);
          state.remoteError = "Dados locais limpos. Supabase não conseguiu limpar remoto.";
        });
      }

      function uid(prefix = "quiz") {
        return prefix + "-" + Math.random().toString(36).slice(2, 8);
      }

      function encodeQuiz(quiz) {
        const json = JSON.stringify(quiz);
        return btoa(unescape(encodeURIComponent(json)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/g, "");
      }

      function decodeQuiz(payload) {
        const base64 = payload.replace(/-/g, "+").replace(/_/g, "/");
        const padded = base64 + "=".repeat((4 - base64.length % 4) % 4);
        return JSON.parse(decodeURIComponent(escape(atob(padded))));
      }

      function shareUrl(quiz) {
        const url = new URL(window.location.href);
        url.search = "";
        url.hash = "";
        url.searchParams.set("quiz", slugFor(quiz));
        return url.toString();
      }

      function previewUrl() {
        const url = new URL(window.location.href);
        url.search = "";
        url.hash = "";
        url.searchParams.set("preview", "1");
        url.searchParams.set("quiz", slugFor(activeQuiz()));
        return url.toString();
      }

      function getPublicQuiz() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("preview") === "1") {
          const previewSlug = params.get("quiz");
          const previewQuiz = state.quizzes.find((quiz) => slugFor(quiz) === previewSlug) || activeQuiz();
          return normalizeQuiz(previewQuiz);
        }
        const encoded = params.get("q");
        if (!encoded) {
          const slug = params.get("quiz");
          if (!slug) return null;
          return normalizeQuiz(state.quizzes.find((quiz) => slugFor(quiz) === slug) || null);
        }
        try {
          return normalizeQuiz(decodeQuiz(encoded));
        } catch (error) {
          return null;
        }
      }

      function normalizeQuiz(quiz) {
        const clean = clone(quiz || defaultQuiz);
        clean.slug = clean.slug || slugify(clean.title || clean.id || "quiz");
        clean.questions = (clean.questions || []).filter(Boolean);
        clean.results = (clean.results || []).filter(Boolean);
        clean.questions.forEach((question) => {
          question.options = (question.options || []).filter(Boolean);
        });
        if (!clean.questions.length) clean.questions = clone(defaultQuiz.questions);
        if (!clean.results.length) clean.results = clone(defaultQuiz.results);
        clean.stageComponents = clean.stageComponents || {};
        Object.values(clean.stageComponents).flat().forEach((component) => {
          if (component?.type === "Timer") {
            component.action = "show";
            component.showCountdown = false;
            component.behaviorVersion = 2;
          }
        });
        return clean;
      }

      function stageKey(quiz, stage = state.adminStage) {
        if (stage === 0) return "intro";
        if (stage > 0 && stage <= quiz.questions.length) return `question:${stage - 1}`;
        if (stage === quiz.questions.length + 1) return "loading";
        if (stage === quiz.questions.length + 2) return "result";
        return "publication";
      }

      function addStageComponent(type) {
        const quiz = activeQuiz();
        quiz.stageComponents ||= {};
        const key = stageKey(quiz);
        if (key === "publication") return;
        const defaults = {
          "Vídeo": { content: "", label: "Cole aqui o link ou código de incorporação da Vturb" },
          "Imagem": { content: "", label: "Cole a URL da imagem" },
          "Botão": { content: "Quero continuar", url: "#" },
          "Espaço": { content: "48" },
          "Timer": { content: "10", action: "show", targetIds: [], showCountdown: false, behaviorVersion: 2 },
          "Script": { content: "" }
        };
        const component = { id: uid("component"), type, position: 4, aspectRatio: "16:9", ...(defaults[type] || { content: `Novo componente de ${type}` }) };
        (quiz.stageComponents[key] ||= []).push(component);
        state.selectedComponentId = component.id;
        saveQuizzes();
        render();
      }

      function removeStageComponent(id) {
        const quiz = activeQuiz();
        const key = stageKey(quiz);
        quiz.stageComponents[key] = (quiz.stageComponents?.[key] || []).filter((item) => item.id !== id);
        state.selectedComponentId = null;
        saveQuizzes();
        render();
      }

      function moveStageComponent(id, direction) {
        const quiz = activeQuiz();
        const components = quiz.stageComponents?.[stageKey(quiz)] || [];
        const from = components.findIndex((item) => item.id === id);
        if (from < 0) return;
        const component = components[from];
        component.position = Math.max(0, Math.min(4, Number(component.position ?? 4) + direction));
        saveQuizzes();
        render();
      }

      function reorderStageComponent(draggedId, targetId) {
        if (!draggedId || !targetId || draggedId === targetId) return;
        const quiz = activeQuiz();
        const components = quiz.stageComponents?.[stageKey(quiz)] || [];
        const from = components.findIndex((item) => item.id === draggedId);
        const to = components.findIndex((item) => item.id === targetId);
        if (from < 0 || to < 0) return;
        const [component] = components.splice(from, 1);
        components.splice(to, 0, component);
        saveQuizzes();
        render();
      }

      function setStageComponentPosition(id, position) {
        const quiz = activeQuiz();
        const component = (quiz.stageComponents?.[stageKey(quiz)] || []).find((item) => item.id === id);
        if (!component) return;
        component.position = Math.max(0, Math.min(4, Number(position)));
        saveQuizzes();
        render();
      }

      function activeQuiz() {
        if (!state.activeId) state.activeId = state.quizzes[0].id;
        return state.quizzes.find((quiz) => quiz.id === state.activeId) || state.quizzes[0];
      }

      function setField(path, value) {
        const quiz = activeQuiz();
        if (path === "slug") value = slugify(value);
        const parts = path.split(".");
        let target = quiz;
        while (parts.length > 1) target = target[parts.shift()];
        target[parts[0]] = value;
        saveQuizzes();
        render();
      }

      function slugify(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 60) || "quiz";
      }

      function slugFor(quiz) {
        return slugify(quiz.slug || quiz.title || quiz.id);
      }

      function addQuiz() {
        const quiz = clone(defaultQuiz);
        quiz.id = uid("quiz");
        quiz.title = "Novo quiz inteligente";
        quiz.slug = slugify(`novo-quiz-${quiz.id.slice(-6)}`);
        state.quizzes.unshift(quiz);
        state.activeId = quiz.id;
        state.adminStage = 0;
        state.previewStep = 0;
        saveQuizzes();
        render();
      }

      function duplicateQuiz(id) {
        const source = state.quizzes.find((quiz) => quiz.id === id);
        if (!source) return;
        const quiz = clone(source);
        quiz.id = uid("quiz");
        quiz.title = source.title + " - copia";
        quiz.slug = slugify(`${slugFor(source)}-${quiz.id.slice(-6)}`);
        state.quizzes.unshift(quiz);
        state.activeId = quiz.id;
        state.adminStage = 0;
        saveQuizzes();
        render();
      }

      function removeQuiz(id) {
        if (state.quizzes.length === 1) return;
        state.quizzes = state.quizzes.filter((quiz) => quiz.id !== id);
        state.activeId = state.quizzes[0].id;
        state.adminStage = 0;
        saveQuizzes();
        render();
      }

      function addQuestion() {
        const quiz = activeQuiz();
        quiz.questions.push({
          text: "Nova pergunta",
          options: [
            { text: "Opcao A", profile: "planejador", weight: 1 },
            { text: "Opcao B", profile: "economia", weight: 2 }
          ]
        });
        state.adminStage = quiz.questions.length;
        saveQuizzes();
        render();
      }

      function removeQuestion(index) {
        const quiz = activeQuiz();
        if (quiz.questions.length === 1) return;
        quiz.questions.splice(index, 1);
        state.adminStage = Math.min(state.adminStage, quiz.questions.length);
        state.previewStep = Math.min(state.previewStep, quiz.questions.length - 1);
        saveQuizzes();
        render();
      }

      function addOption(questionIndex) {
        activeQuiz().questions[questionIndex].options.push({
          text: "Nova opcao",
          profile: "planejador",
          weight: 1
        });
        saveQuizzes();
        render();
      }

      function removeOption(questionIndex, optionIndex) {
        const options = activeQuiz().questions[questionIndex].options;
        if (options.length === 1) return;
        options.splice(optionIndex, 1);
        saveQuizzes();
        render();
      }

      function updateOption(questionIndex, optionIndex, key, value) {
        const option = activeQuiz().questions[questionIndex].options[optionIndex];
        option[key] = key === "weight" ? Number(value || 0) : value;
        saveQuizzes();
        render();
      }

      function addResult() {
        activeQuiz().results.push({
          profile: "novo",
          title: "Novo resultado",
          text: "Explique aqui a recomendacao personalizada.",
          bullets: ["Primeiro beneficio", "Segundo beneficio"]
        });
        saveQuizzes();
        render();
      }

      function removeResult(index) {
        const results = activeQuiz().results;
        if (results.length === 1) return;
        results.splice(index, 1);
        saveQuizzes();
        render();
      }

      function resultFor(quiz, answers) {
        const scores = {};
        answers.forEach((answer, index) => {
          const option = quiz.questions[index]?.options[answer];
          if (!option) return;
          scores[option.profile] = (scores[option.profile] || 0) + Number(option.weight || 1);
        });
        const best = Object.entries(scores).sort((a, b) => b[1] - a[1])[0]?.[0];
        return quiz.results.find((result) => result.profile === best) || quiz.results[0];
      }

      function recordSubmission(quiz) {
        if (state.submittedThisRun) return;
        if (isTestName(state.lead.name)) return;
        const result = resultFor(quiz, state.answers);
        const submission = {
          id: uid("resposta"),
          quizId: quiz.id,
          createdAt: new Date().toISOString(),
          travelerName: state.lead.name || "",
          answers: state.answers.slice(0, quiz.questions.length),
          resultProfile: result.profile,
          resultTitle: result.title
        };
        state.submissions.push(submission);
        state.submittedThisRun = true;
        saveSubmissions();
        syncSubmission(submission);
      }

      function visitorSessionId() {
        let id = sessionStorage.getItem("quizlab_session_id");
        if (!id) {
          id = uid("sessao");
          sessionStorage.setItem("quizlab_session_id", id);
        }
        return id;
      }

      function currentFunnelSessionId(quiz) {
        return `${visitorSessionId()}:${quiz.id}`;
      }

      function ignoredSessionKey(quiz) {
        return `quizlab_ignore_tracking_${quiz.id}`;
      }

      function isCurrentRunIgnored(quiz) {
        return sessionStorage.getItem(ignoredSessionKey(quiz)) === "1";
      }

      function setCurrentRunIgnored(quiz, ignored) {
        if (ignored) sessionStorage.setItem(ignoredSessionKey(quiz), "1");
        else sessionStorage.removeItem(ignoredSessionKey(quiz));
      }

      function normalizeName(value) {
        return String(value || "")
          .trim()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      }

      function isTestName(value) {
        return normalizeName(value).includes("teste");
      }

      function funnelSteps(quiz) {
        return [
          { key: "visit", label: "Abertura", rank: 0 },
          { key: "start", label: "Começou", rank: 1 },
          { key: "name", label: "Nome", rank: 2 },
          ...quiz.questions.map((_, index) => ({
            key: `question-${index + 1}`,
            label: `Pergunta ${index + 1}`,
            rank: index + 3
          })),
          { key: "loading", label: "Loading", rank: quiz.questions.length + 3 },
          { key: "result", label: "Resultado", rank: quiz.questions.length + 4 },
          { key: "checkout", label: "Clique checkout", rank: quiz.questions.length + 5 }
        ];
      }

      function currentFunnelStep(quiz) {
        if (state.flowStage === "name") return { key: "name", rank: 2 };
        if (state.flowStage === "quiz") {
          return funnelSteps(quiz)[Math.min(state.previewStep + 3, quiz.questions.length + 2)];
        }
        if (state.flowStage === "loading") return { key: "loading", rank: quiz.questions.length + 3 };
        if (state.flowStage === "result") return { key: "result", rank: quiz.questions.length + 4 };
        return { key: "visit", rank: 0 };
      }

      function recordFunnelStep(quiz, step) {
        if (adminRoute()) return;
        if (isCurrentRunIgnored(quiz)) return;
        const sessionId = currentFunnelSessionId(quiz);
        let record = state.funnel.find((item) => item.sessionId === sessionId && item.quizId === quiz.id);
        let changed = false;
        if (!record) {
          record = {
            sessionId,
            quizId: quiz.id,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            maxRank: 0,
            stage: "visit"
          };
          state.funnel.push(record);
          changed = true;
        }
        if (step.rank > Number(record.maxRank || 0)) {
          record.maxRank = step.rank;
          record.stage = step.key;
          changed = true;
        }
        if (changed) {
          record.updatedAt = new Date().toISOString();
          saveFunnel();
          syncFunnel(record);
        }
      }

      function recordFunnelProgress(quiz) {
        recordFunnelStep(quiz, currentFunnelStep(quiz));
      }

      function recordCheckoutClick(quiz) {
        recordFunnelStep(quiz, { key: "checkout", rank: quiz.questions.length + 5 });
      }

      function removeCurrentFunnelRecord(quiz) {
        const sessionId = currentFunnelSessionId(quiz);
        state.funnel = state.funnel.filter((item) => item.sessionId !== sessionId);
        saveFunnel();
        supabaseRequest(`quiz_funnel?session_id=eq.${encodeURIComponent(sessionId)}`, { method: "DELETE" })
          .catch((error) => console.warn("Nao foi possivel remover funil de teste:", error));
      }

      function copyLink() {
        const link = shareUrl(activeQuiz());
        navigator.clipboard?.writeText(link);
        const field = document.querySelector("[data-share-link]");
        if (field) field.select();
      }

      function adminRoute() {
        const params = new URLSearchParams(window.location.search);
        return params.get("admin") === "1" || (!params.has("q") && !params.has("quiz") && params.get("preview") !== "1");
      }

      function render() {
        const routeParams = new URLSearchParams(window.location.search);
        const publicSlug = routeParams.get("quiz");
        if (publicSlug && !adminRoute() && !routeParams.has("q") && !routeParams.has("preview")) {
          loadRemotePublicQuiz(publicSlug);
        }
        const publicQuiz = getPublicQuiz();
        const isPublic = publicQuiz && !adminRoute();
        const publicScrollKey = isPublic
          ? `${publicQuiz.id}:${state.flowStage}:${state.flowStage === "quiz" ? state.previewStep : ""}`
          : "";
        const shouldScrollTop = isPublic && publicScrollKey !== lastPublicScrollKey;
        if (isPublic) recordFunnelProgress(publicQuiz);
        if (!isPublic && !state.remoteError) loadRemoteData();
        document.getElementById("app").innerHTML = isPublic
          ? publicView(publicQuiz)
          : dashboardView();
        bindEvents(isPublic ? publicQuiz : activeQuiz());
        if (isPublic) {
          lastPublicScrollKey = publicScrollKey;
          if (shouldScrollTop) {
            window.requestAnimationFrame(() => window.scrollTo({ top: 0, left: 0, behavior: "auto" }));
          }
        } else {
          lastPublicScrollKey = "";
          fitAdminCanvas();
        }
      }

      function fitAdminCanvas() {
        window.requestAnimationFrame(() => {
          const frame = document.querySelector(".selected-outline");
          const page = frame?.querySelector(".canvas-live-page");
          if (!frame || !page) return;
          const availableWidth = Math.max(320, frame.clientWidth - 4);
          page.style.zoom = String(Math.min(1, availableWidth / 1040));
        });
      }

      function refreshAdminCanvas() {
        if (adminRoute() && state.adminTab === "builder") {
          const frame = document.querySelector(".selected-outline");
          if (frame) {
            frame.innerHTML = adminCanvasPreview(activeQuiz());
            bindRefreshedAdminPreview(frame);
            bindRefreshedCanvasEditing(frame);
            fitAdminCanvas();
          }
        }
      }

      function bindRefreshedAdminPreview(frame) {
        frame.querySelectorAll("[data-action]").forEach((element) => {
          element.addEventListener("click", (event) => {
            const action = element.dataset.action;
            if (action === "preview-start") state.adminStage = Math.min(1, activeQuiz().questions.length);
            if (action === "preview-answer") state.adminStage = Math.min(state.adminStage + 1, activeQuiz().questions.length + 1);
            if (action === "preview-reset") state.adminStage = 0;
            if (action === "preview-checkout-click") window.open(element.href, "_blank", "noopener");
            if (action === "select-custom-component") {
              if (event.target.closest(".canvas-component-toolbar, .inline-video-editor, .inline-property-editor, .inline-timer-editor, input, textarea, select, [contenteditable='true']")) return;
              state.selectedComponentId = element.dataset.componentId;
            }
            if (action === "remove-stage-component") removeStageComponent(element.dataset.componentId);
            if (action === "move-custom-up") moveStageComponent(element.dataset.componentId, -1);
            if (action === "move-custom-down") moveStageComponent(element.dataset.componentId, 1);
            event.preventDefault();
            if (!["remove-stage-component", "move-custom-up", "move-custom-down"].includes(action)) render();
          });
        });
      }

      function bindRefreshedCanvasEditing(root) {
        root.querySelectorAll("[data-inline-component]").forEach((input) => {
          input.addEventListener("input", () => {
            const components = activeQuiz().stageComponents?.[stageKey(activeQuiz())] || [];
            const component = components.find((item) => item.id === input.dataset.inlineComponent);
            if (!component) return;
            component[input.dataset.componentKey] = input.matches("textarea, input, select") ? input.value : input.textContent;
            saveQuizzes();
          });
          if (input.matches("textarea, input, select")) input.addEventListener("change", refreshAdminCanvas);
          input.addEventListener("click", (event) => event.stopPropagation());
        });
        root.querySelectorAll("[data-timer-target]").forEach((input) => {
          input.addEventListener("change", () => {
            const timer = (activeQuiz().stageComponents?.[stageKey(activeQuiz())] || []).find((item) => item.id === input.dataset.timerTarget);
            if (!timer) return;
            timer.targetIds ||= [];
            if (input.checked && !timer.targetIds.includes(input.value)) timer.targetIds.push(input.value);
            if (!input.checked) timer.targetIds = timer.targetIds.filter((id) => id !== input.value);
            saveQuizzes();
          });
        });
        root.querySelectorAll("[data-timer-countdown]").forEach((input) => {
          input.addEventListener("change", () => {
            const timer = (activeQuiz().stageComponents?.[stageKey(activeQuiz())] || []).find((item) => item.id === input.dataset.timerCountdown);
            if (!timer) return;
            timer.showCountdown = input.checked;
            saveQuizzes();
          });
        });
        root.querySelectorAll("[data-custom-draggable]").forEach((component) => {
          component.addEventListener("dragstart", (event) => {
            if (event.target.closest("textarea, input, [contenteditable='true']")) return event.preventDefault();
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/custom-component-id", component.dataset.customDraggable);
            component.classList.add("is-dragging-component");
          });
          component.addEventListener("dragend", () => component.classList.remove("is-dragging-component"));
          component.addEventListener("dragover", (event) => {
            if (!event.dataTransfer.types.includes("text/custom-component-id")) return;
            event.preventDefault();
            event.stopPropagation();
            component.classList.add("component-drop-target");
          });
          component.addEventListener("dragleave", () => component.classList.remove("component-drop-target"));
          component.addEventListener("drop", (event) => {
            const draggedId = event.dataTransfer.getData("text/custom-component-id");
            if (!draggedId) return;
            event.preventDefault();
            event.stopPropagation();
            reorderStageComponent(draggedId, component.dataset.customDraggable);
          });
        });
        root.querySelectorAll("[data-component-position]").forEach((zone) => {
          zone.addEventListener("dragover", (event) => {
            if (!event.dataTransfer.types.includes("text/custom-component-id")) return;
            event.preventDefault();
            event.stopPropagation();
            zone.classList.add("position-drop-active");
          });
          zone.addEventListener("dragleave", () => zone.classList.remove("position-drop-active"));
          zone.addEventListener("drop", (event) => {
            const id = event.dataTransfer.getData("text/custom-component-id");
            if (!id) return;
            event.preventDefault();
            event.stopPropagation();
            setStageComponentPosition(id, zone.dataset.componentPosition);
          });
        });
      }

              ${loadingView(quiz, true)}

          return `
            <div class="canvas-live-page public-shell">
              ${resultView(quiz, result, true)}
            </div>
          `;

        if (stage === quiz.questions.length + 3) {
          return `

              ${introView(quiz, true)}

          return `
            <div class="section-title compact">
              <h3>Pergunta ${stage}</h3>
              <button type="button" class="secondary-btn" data-action="add-question">+ pergunta</button>
            </div>
            ${questionEditor(quiz.questions[stage - 1], stage - 1)}
          `;
        }

        if (stage === quiz.questions.length + 1) {
          return `
            <h3>Loading</h3>
            <label class="field">
              <span>Texto superior</span>
              <input value="Preparando seu diagnóstico" readonly>
            </label>
            <label class="field">
              <span>Progresso inicial</span>
              <input value="10%" readonly>
            </label>
            <p class="settings-note">Essa etapa aparece automaticamente depois da última pergunta.</p>
          `;
        }

        if (stage === quiz.questions.length + 2) {
          return `
            <div class="section-title compact">
              <h3>Resultados</h3>
              <button type="button" class="secondary-btn" data-action="add-result">+ resultado</button>
            </div>
            <div class="stack">
              ${quiz.results.map((result, index) => resultEditor(result, index)).join("")}
            </div>
          `;
        }

        return `
          <h3>Publicação</h3>
          <label class="field"><span>Nome do link permanente</span><input readonly value="${escapeAttr(slugFor(quiz))}"></label>
          ${textInput("Link de compra ou WhatsApp", "purchaseUrl", quiz.purchaseUrl)}
          <div class="copy-row">
            <input readonly value="${escapeAttr(link)}" data-share-link>
            <button type="button" class="icon-btn" data-action="copy-link" aria-label="Copiar link">${icon("copy")}</button>
          </div>
          <a class="primary-btn full" href="${escapeAttr(link)}" target="_blank" rel="noopener">Abrir link do usuário</a>
        `;
      }

      function stageComponentsEditor(quiz, stage) {
        const components = quiz.stageComponents?.[stageKey(quiz, stage)] || [];
        if (!components.length) return `<p class="settings-note component-help">Clique ou arraste um componente para a página.</p>`;
        return `
          <div class="added-components">
            <h3>Componentes adicionados</h3>
            ${components.map((component) => `
              <article class="editor-card ${state.selectedComponentId === component.id ? "selected-component-editor" : ""}">
                <div class="card-head">
                  <strong>${escapeHtml(component.type)}</strong>
                  <button type="button" class="text-btn" data-action="remove-stage-component" data-component-id="${component.id}">Remover</button>
                </div>
                ${component.type === "Timer" ? timerComponentEditor(quiz, stage, component) : `<label class="field">
                  <span>${component.type === "Vídeo" ? "Link ou código embed da Vturb" : component.type === "Imagem" ? "URL da imagem" : "Conteúdo"}</span>
                  <textarea rows="5" placeholder="${escapeAttr(component.label || "Digite o conteúdo")}" data-stage-component="${component.id}" data-component-key="content">${escapeHtml(component.content || "")}</textarea>
                </label>`}
                ${component.type === "Botão" ? `<label class="field"><span>Link do botão</span><input value="${escapeAttr(component.url || "#")}" data-stage-component="${component.id}" data-component-key="url"></label>` : ""}
                ${component.type === "Vídeo" ? `<label class="field"><span>Formato</span><select data-stage-component="${component.id}" data-component-key="aspectRatio"><option value="16:9" ${component.aspectRatio !== "9:16" ? "selected" : ""}>Horizontal 16:9</option><option value="9:16" ${component.aspectRatio === "9:16" ? "selected" : ""}>Reels 9:16</option></select></label>` : ""}
              </article>
            `).join("")}
          </div>
        `;
      }

      function timerTargetOptions(quiz, stage) {
        const key = stageKey(quiz, stage);
        const common = {
          intro: [["intro-title", "Título"], ["intro-image", "Imagem principal"], ["intro-subtitle", "Subtítulo"], ["intro-cta", "Botão de começar"], ["intro-trust", "Selos de segurança"]],
          loading: [["loading-title", "Título do carregamento"], ["loading-progress", "Barra de progresso"], ["loading-social", "Depoimentos"]],
          result: [["result-title", "Título do resultado"], ["result-diagnosis", "Diagnóstico"], ["result-organization-title", "Título: Precisa de organização"], ["result-copy", "Texto de venda"], ["result-benefits", "Benefícios"], ["result-cta", "Botão principal"]]
        };
        const base = key.startsWith("question:")
          ? [["question-title", "Pergunta"], ["question-options", "Opções de resposta"]]
          : (common[key] || []);
        const custom = (quiz.stageComponents?.[key] || [])
          .filter((item) => item.type !== "Timer")
          .map((item, index) => [`component:${item.id}`, `${item.type} ${index + 1}`]);
        return [...base, ...custom];
      }

      function timerComponentEditor(quiz, stage, component) {
        const selected = component.targetIds || [];
        return `
          <div class="timer-editor">
            <label class="field"><span>Atraso em segundos</span><input type="number" min="0" value="${Math.max(0, Number(component.content) || 0)}" data-stage-component="${component.id}" data-component-key="content"></label>
            <p class="timer-behavior-note">Os elementos marcados começam escondidos e aparecem quando o tempo terminar. O relógio não aparece para o usuário.</p>
            <strong class="timer-target-title">Elementos afetados</strong>
            <div class="timer-target-list">
              ${timerTargetOptions(quiz, stage).map(([id, label]) => `<label class="check-row"><input type="checkbox" value="${escapeAttr(id)}" ${selected.includes(id) ? "checked" : ""} data-timer-target="${component.id}"> ${escapeHtml(label)}</label>`).join("") || `<p class="settings-note">Adicione outro componente nesta etapa para controlá-lo.</p>`}
            </div>
          </div>
        `;
      }

      function inlineTimerEditor(component) {
        const targets = timerTargetOptions(activeQuiz(), state.adminStage);
        const selected = component.targetIds || [];
        return `
          <div class="inline-timer-editor">
            <div class="inline-timer-head single-field">
              <label>Tempo em segundos<input type="number" min="0" value="${Math.max(0, Number(component.content) || 0)}" data-inline-component="${component.id}" data-component-key="content"></label>
            </div>
            <p class="timer-behavior-note">Os itens marcados começam escondidos e aparecem após esse tempo. O relógio fica invisível para o usuário.</p>
            <strong>O que este Timer controla?</strong>
            <div class="inline-timer-targets">
              ${targets.map(([id, label]) => `<label><input type="checkbox" value="${escapeAttr(id)}" ${selected.includes(id) ? "checked" : ""} data-timer-target="${component.id}"><span>${escapeHtml(label)}</span></label>`).join("") || `<p>Adicione um elemento nesta etapa para poder selecioná-lo.</p>`}
            </div>
          </div>
        `;
      }

      function stageComponentsView(quiz, key, preview, position = 4) {
        const components = (quiz.stageComponents?.[key] || []).filter((component) => Number(component.position ?? 4) === position);
        if (!components.length && !preview) return "";
        const dropData = preview ? ` data-component-position="${position}"` : "";
        return `<div class="custom-components ${components.length ? "" : "empty-component-position"}"${dropData}>${components.map((component) => componentView(component, preview)).join("")}</div>`;
      }

      function componentView(component, preview) {
        const selected = preview && state.selectedComponentId === component.id ? " selected-custom-component" : "";
        const selectAttr = preview ? ` data-action="select-custom-component" data-component-id="${component.id}"` : "";
        const dragAttr = preview ? ` draggable="true" data-custom-draggable="${component.id}"` : "";
        const toolbar = preview && state.selectedComponentId === component.id ? `
          <div class="canvas-component-toolbar" contenteditable="false">
            <span class="drag-handle" title="Arraste para mover">⠿</span>
            <button type="button" data-action="move-custom-up" data-component-id="${component.id}" title="Mover para cima">↑</button>
            <button type="button" data-action="move-custom-down" data-component-id="${component.id}" title="Mover para baixo">↓</button>
            <button type="button" class="delete-canvas-component" data-action="remove-stage-component" data-component-id="${component.id}" title="Excluir">×</button>
          </div>` : "";
        const targetAttr = ` data-delay-target="component:${component.id}"`;
        if (component.type === "Timer") {
          if (!preview) return "";
          const seconds = Math.max(0, Number(component.content) || 0);
          const directEditor = preview && state.selectedComponentId === component.id ? inlineTimerEditor(component) : "";
          return `<div class="custom-component timer-component${selected}"${selectAttr}${dragAttr}${targetAttr}>${toolbar}<div class="timer-summary"><span>⏱</span><strong data-timer-display="${component.id}">${seconds}s</strong><small>${component.action === "hide" ? "até ocultar" : "até liberar"}</small></div>${directEditor}</div>`;
        }
        if (component.type === "Vídeo") {
          const value = String(component.content || "").trim();
          let player = `<div class="video-placeholder">Cole o link ou código da Vturb nas configurações</div>`;
          if (/^https?:\/\//i.test(value)) player = `<iframe src="${escapeAttr(value)}" title="Vídeo" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
          else if (value) player = `<iframe srcdoc="${escapeAttr(value)}" title="Vídeo" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
          const inlineEditor = preview && state.selectedComponentId === component.id ? `<div class="inline-video-editor"><label>Link ou código da Vturb</label><textarea data-inline-component="${component.id}" data-component-key="content" placeholder="Cole aqui o link ou embed da Vturb">${escapeHtml(value)}</textarea><div class="inline-video-options"><label>Formato<select data-inline-component="${component.id}" data-component-key="aspectRatio"><option value="16:9" ${component.aspectRatio !== "9:16" ? "selected" : ""}>Horizontal 16:9</option><option value="9:16" ${component.aspectRatio === "9:16" ? "selected" : ""}>Reels 9:16</option></select></label><label>Posição<select data-inline-component="${component.id}" data-component-key="position">${["Topo", "Após o título", "Após o diagnóstico", "Após o texto", "Antes do botão"].map((label, index) => `<option value="${index}" ${Number(component.position ?? 4) === index ? "selected" : ""}>${label}</option>`).join("")}</select></label></div></div>` : "";
          const ratioClass = component.aspectRatio === "9:16" ? " video-reels" : "";
          return `<div class="custom-component video-component${ratioClass}${selected}"${selectAttr}${dragAttr}${targetAttr}>${toolbar}${player}${inlineEditor}</div>`;
        }
        if (component.type === "Imagem") return `<div class="custom-component${selected}"${selectAttr}${dragAttr}${targetAttr}>${toolbar}${component.content ? `<img class="custom-image" src="${escapeAttr(component.content)}" alt="">` : `<div class="component-placeholder">Imagem</div>`}${preview && state.selectedComponentId === component.id ? `<div class="inline-property-editor"><input value="${escapeAttr(component.content || "")}" placeholder="URL da imagem" data-inline-component="${component.id}" data-component-key="content"></div>` : ""}</div>`;
        if (component.type === "Botão") return `<div class="custom-component${selected}"${selectAttr}${dragAttr}${targetAttr}>${toolbar}<a class="diagnostic-btn custom-button" href="${escapeAttr(component.url || "#")}" contenteditable="${preview ? "true" : "false"}" data-inline-component="${component.id}" data-component-key="content">${escapeHtml(component.content || "Botão")}</a>${preview && state.selectedComponentId === component.id ? `<div class="inline-property-editor"><input value="${escapeAttr(component.url || "")}" placeholder="Link do botão" data-inline-component="${component.id}" data-component-key="url"></div>` : ""}</div>`;
        if (component.type === "Espaço") return `<div class="custom-component spacer-component${selected}" style="height:${Math.max(8, Number(component.content) || 48)}px"${selectAttr}${dragAttr}${targetAttr}>${toolbar}${preview && state.selectedComponentId === component.id ? `<div class="inline-property-editor"><input type="number" min="8" value="${escapeAttr(component.content || "48")}" aria-label="Altura do espaço" data-inline-component="${component.id}" data-component-key="content"></div>` : ""}</div>`;
        return `<div class="custom-component generic-component${selected}"${selectAttr}${dragAttr}${targetAttr}>${toolbar}<strong>${escapeHtml(component.type)}</strong><p contenteditable="${preview ? "true" : "false"}" data-inline-component="${component.id}" data-component-key="content">${escapeHtml(component.content || "Clique para editar")}</p></div>`;
      }

      function quizSubmissions(quiz) {
        return state.submissions.filter((item) => item.quizId === quiz.id && !isTestName(item.travelerName));
      }

      function quizFunnelRecords(quiz) {
        const records = state.funnel.filter((item) => item.quizId === quiz.id);
        const resultRank = quiz.questions.length + 4;
        const completedTracked = records.filter((item) => Number(item.maxRank || 0) >= resultRank).length;
        const missingCompleted = Math.max(0, quizSubmissions(quiz).length - completedTracked);
        return records.concat(Array.from({ length: missingCompleted }).map((_, index) => ({
          sessionId: `resposta-antiga-${index}`,
          quizId: quiz.id,
          maxRank: resultRank,
          stage: "result"
        })));
      }

      function homeView(quiz) {
        const submissions = quizSubmissions(quiz);
        const total = submissions.length;
        const resultCounts = countBy(submissions, "resultProfile");
        const topResult = Object.entries(resultCounts).sort((a, b) => b[1] - a[1])[0];
        const completionRate = total ? "100%" : "0%";
        return `
          <section class="admin-page">
            <div class="admin-page-head">
              <div>
                <p class="admin-kicker">Home</p>
                <h1>Resumo do quiz</h1>
              </div>
              <a class="publish-btn" href="${escapeAttr(shareUrl(quiz))}" target="_blank" rel="noopener">Ver página</a>
            </div>

            <div class="metric-grid">
              ${metricCard("Respostas", total)}
              ${metricCard("Perguntas", quiz.questions.length)}
              ${metricCard("Perfil principal", topResult ? profileLabel(quiz, topResult[0]) : "Sem dados")}
              ${metricCard("Conclusão", completionRate)}
            </div>

            <div class="admin-panel-grid">
              <article class="admin-panel">
                <h2>Últimas respostas</h2>
                ${latestSubmissionsTable(quiz, submissions.slice(-6).reverse())}
              </article>
              <article class="admin-panel">
                <h2>Distribuição de perfis</h2>
                ${profileBars(quiz, submissions)}
              </article>
            </div>
          </section>
        `;
      }

      function flowView(quiz) {
        const submissions = quizSubmissions(quiz);
        const funnelRecords = quizFunnelRecords(quiz);
        return `
          <section class="admin-page">
            <div class="admin-page-head">
              <div>
                <p class="admin-kicker">Fluxo</p>
                <h1>Como as pessoas respondem</h1>
              </div>
              <button class="secondary-btn" data-action="clear-submissions">Limpar respostas</button>
            </div>
            ${funnelView(quiz, funnelRecords)}
            <div class="flow-map">
              ${quiz.questions.map((question, qIndex) => questionFlowCard(question, qIndex, submissions)).join("")}
            </div>
          </section>
        `;
      }

      function leadsView(quiz) {
        const submissions = quizSubmissions(quiz).slice().reverse();
        return `
          <section class="admin-page">
            <div class="admin-page-head">
              <div>
                <p class="admin-kicker">Leads</p>
                <h1>Respostas recebidas</h1>
              </div>
              <button class="secondary-btn" data-action="export-submissions">Exportar CSV</button>
            </div>
            <article class="admin-panel">
              ${latestSubmissionsTable(quiz, submissions)}
            </article>
          </section>
        `;
      }

      function designView(quiz) {
        return `
          <section class="admin-page narrow">
            <div class="admin-page-head">
              <div>
                <p class="admin-kicker">Design</p>
                <h1>Estilo da página</h1>
              </div>
            </div>
            <article class="admin-panel design-panel">
              <label class="field">
                <span>Cor principal</span>
                <input type="color" value="${quiz.theme}" data-field="theme">
              </label>
              ${textInput("Selo superior", "badge", quiz.badge)}
              <p class="settings-note">A página pública mantém o modelo das fotos: fundo branco, fonte serifada, progresso em barras e botões cinza.</p>
            </article>
          </section>
        `;
      }

      function settingsView(quiz, link) {
        return `
          <section class="admin-page narrow">
            <div class="admin-page-head">
              <div>
                <p class="admin-kicker">Configurações</p>
                <h1>Publicação e links</h1>
              </div>
            </div>
            <article class="admin-panel settings-publication">
              <label class="field">
                <span>Quiz ativo</span>
                <select data-admin-select>
                  ${state.quizzes.map((item) => `<option value="${item.id}" ${item.id === quiz.id ? "selected" : ""}>${escapeHtml(item.title)}</option>`).join("")}
                </select>
              </label>
              <label class="field"><span>Nome do link permanente</span><input readonly value="${escapeAttr(slugFor(quiz))}"></label>
              ${textInput("Link de compra ou WhatsApp", "purchaseUrl", quiz.purchaseUrl)}
              <label class="field">
                <span>Link do usuário</span>
                <input readonly value="${escapeAttr(link)}" data-share-link>
              </label>
              <div class="quick-actions">
                <button type="button" class="secondary-btn" data-action="copy-link">Copiar</button>
                <button type="button" class="secondary-btn" data-action="add-quiz">Novo</button>
                <button type="button" class="danger-btn" data-action="remove-quiz" data-id="${quiz.id}">Excluir</button>
              </div>
            </article>
          </section>
        `;
      }

      function metricCard(label, value) {
        return `
          <article class="metric-card">
            <span>${label}</span>
            <strong>${escapeHtml(value)}</strong>
          </article>
        `;
      }

      function funnelView(quiz, records) {
        const steps = funnelSteps(quiz);
        if (!records.length) {
          return `
            <article class="funnel-panel empty">
              <div>
                <p class="admin-kicker">Funil</p>
                <h2>Passagem por etapa</h2>
              </div>
              <p>Abra o link público e faça um teste para começar a medir onde as pessoas avançam ou param.</p>
            </article>
          `;
        }

        const total = records.filter((item) => Number(item.maxRank || 0) >= 0).length || 1;
        const resultRank = quiz.questions.length + 4;
        const checkoutRank = quiz.questions.length + 5;
        const resultCount = records.filter((item) => Number(item.maxRank || 0) >= resultRank).length;
        const checkoutCount = records.filter((item) => Number(item.maxRank || 0) >= checkoutRank).length;
        const checkoutConversion = Math.round((checkoutCount / total) * 100);
        const resultToCheckout = resultCount ? Math.round((checkoutCount / resultCount) * 100) : 0;
        return `
          <article class="funnel-panel">
            <div class="funnel-head">
              <div>
                <p class="admin-kicker">Funil</p>
                <h2>Passagem por etapa</h2>
              </div>
              <strong>${total} visitante(s)</strong>
            </div>
            <div class="funnel-summary">
              <div><span>Cliques no checkout</span><strong>${checkoutCount}</strong></div>
              <div><span>Conversão total</span><strong>${checkoutConversion}%</strong></div>
              <div><span>Resultado → checkout</span><strong>${resultToCheckout}%</strong></div>
            </div>
            <div class="funnel-chart">
              ${steps.map((step, index) => {
                const count = records.filter((item) => Number(item.maxRank || 0) >= step.rank).length;
                const previous = index === 0 ? count : records.filter((item) => Number(item.maxRank || 0) >= steps[index - 1].rank).length;
                const percent = Math.round((count / total) * 100);
                const drop = Math.max(0, previous - count);
                return `
                  <div class="funnel-step" style="--pct:${percent}">
                    <span>${escapeHtml(step.label)}</span>
                    <b>${percent}%</b>
                    <strong>${count}</strong>
                    <small>${drop ? `-${drop} queda` : "sem queda"}</small>
                    <i></i>
                  </div>
                `;
              }).join("")}
            </div>
          </article>
        `;
      }

      function questionFlowCard(question, qIndex, submissions) {
        const total = submissions.length || 0;
        return `
          <article class="flow-card">
            <div class="flow-card-head">
              <span>${qIndex + 1}</span>
              <h2>${escapeHtml(question.text)}</h2>
            </div>
            <div class="flow-options">
              ${question.options.map((option, oIndex) => {
                const count = submissions.filter((submission) => submission.answers[qIndex] === oIndex).length;
                const percent = total ? Math.round((count / total) * 100) : 0;
                return `
                  <div class="flow-option">
                    <div><strong>${escapeHtml(option.text)}</strong><small>${count} resposta(s) · ${percent}%</small></div>
                    <span><i style="width:${percent}%"></i></span>
                  </div>
                `;
              }).join("")}
            </div>
          </article>
        `;
      }

      function latestSubmissionsTable(quiz, submissions) {
        if (!submissions.length) {
          return `<div class="empty-state">Ainda não tem respostas. Abra o link público, complete o quiz e volte aqui para ver o fluxo.</div>`;
        }
        return `
          <div class="response-table">
            <div class="response-row head">
              <span>Data</span><span>Nome</span><span>Perfil</span><span>Respostas</span>
            </div>
            ${submissions.map((submission) => `
              <div class="response-row">
                <span>${new Date(submission.createdAt).toLocaleString("pt-BR")}</span>
                <span>${escapeHtml(submission.travelerName || "-")}</span>
                <span>${escapeHtml(profileLabel(quiz, submission.resultProfile))}</span>
                <span>${submission.answers.map((answer, index) => escapeHtml(quiz.questions[index]?.options[answer]?.text || "-")).join("<br>")}</span>
              </div>
            `).join("")}
          </div>
        `;
      }

      function profileBars(quiz, submissions) {
        if (!submissions.length) return `<div class="empty-state">Sem dados por enquanto.</div>`;
        const counts = countBy(submissions, "resultProfile");
        return Object.entries(counts).map(([profile, count]) => {
          const percent = Math.round((count / submissions.length) * 100);
          return `
            <div class="profile-bar">
              <div><strong>${escapeHtml(profileLabel(quiz, profile))}</strong><span>${count} · ${percent}%</span></div>
              <em><i style="width:${percent}%"></i></em>
            </div>
          `;
        }).join("");
      }

      function countBy(items, key) {
        return items.reduce((acc, item) => {
          const value = item[key] || "sem-perfil";
          acc[value] = (acc[value] || 0) + 1;
          return acc;
        }, {});
      }

      function profileLabel(quiz, profile) {
        return quiz.results.find((result) => result.profile === profile)?.title || profile;
      }

      function textInput(label, field, value) {
        return `
          <label class="field">
            <span>${label}</span>
            <input value="${escapeAttr(value)}" data-field="${field}">
          </label>
        `;
      }

      function textareaInput(label, field, value) {
        return `
          <label class="field">
            <span>${label}</span>
            <textarea rows="3" data-field="${field}">${escapeHtml(value)}</textarea>
          </label>
        `;
      }

      function questionEditor(question, qIndex) {
        return `
          <article class="editor-card">
            <div class="card-head">
              <strong>Pergunta ${qIndex + 1}</strong>
              <button type="button" class="text-btn" data-action="remove-question" data-q="${qIndex}">Remover</button>
            </div>
            <label class="field">
              <span>Texto da pergunta</span>
              <input value="${escapeAttr(question.text)}" data-question="${qIndex}" data-qkey="text">
            </label>
            <div class="option-list">
              ${question.options.map((option, oIndex) => `
                <div class="option-editor">
                  <input value="${escapeAttr(option.text)}" data-option="${qIndex}:${oIndex}" data-okey="text" aria-label="Texto da opcao">
                  <input value="${escapeAttr(option.profile)}" data-option="${qIndex}:${oIndex}" data-okey="profile" aria-label="Perfil">
                  <input type="number" min="0" value="${Number(option.weight || 1)}" data-option="${qIndex}:${oIndex}" data-okey="weight" aria-label="Peso">
                  <button type="button" class="mini-btn" data-action="remove-option" data-q="${qIndex}" data-o="${oIndex}">x</button>
                </div>
              `).join("")}
            </div>

      let loadingTimer = null;

      const delayStartedAt = new Map();

      function activeExperienceKey(quiz) {

      function startVisibilityDelays(quiz) {
        delayTimerHandles.forEach((handle) => window.clearTimeout(handle));
        delayTimerHandles = [];
        const key = activeExperienceKey(quiz);
        const timers = (quiz.stageComponents?.[key] || []).filter((item) => item.type === "Timer");
        timers.forEach((timer) => {
          const totalMs = Math.max(0, Number(timer.content) || 0) * 1000;
          const runKey = `${quiz.id}:${key}:${timer.id}`;
          if (!delayStartedAt.has(runKey)) delayStartedAt.set(runKey, Date.now());
          const elapsed = Date.now() - delayStartedAt.get(runKey);
          const remaining = Math.max(0, totalMs - elapsed);
          const targets = timer.targetIds || [];
          targets.forEach((targetId) => {
            document.querySelectorAll(`[data-delay-target="${CSS.escape(targetId)}"]`).forEach((element) => {
              element.classList.toggle("delay-hidden", timer.action !== "hide" && remaining > 0);
              if (timer.action === "hide" && remaining <= 0) element.classList.add("delay-hidden");
            });
          });
          const timerElement = document.querySelector(`[data-timer-display="${CSS.escape(timer.id)}"]`);
          const timerBox = timerElement?.closest(".timer-component");
          if (timer.showCountdown === false && timerBox) timerBox.classList.add("delay-timer-invisible");
          const updateCountdown = () => {
            const left = Math.max(0, totalMs - (Date.now() - delayStartedAt.get(runKey)));
            if (timerElement) timerElement.textContent = `${Math.ceil(left / 1000)}s`;
            if (left > 0) delayTimerHandles.push(window.setTimeout(updateCountdown, 250));
          };
          updateCountdown();
          if (remaining > 0) {
            delayTimerHandles.push(window.setTimeout(() => {
              targets.forEach((targetId) => document.querySelectorAll(`[data-delay-target="${CSS.escape(targetId)}"]`).forEach((element) => {
                element.classList.toggle("delay-hidden", timer.action === "hide");
              }));
            }, remaining));
          }
        });
      }

      function bindEvents(quiz) {
        const publicQuiz = getPublicQuiz();

        if (isPublicPage && state.flowStage === "loading") startLoading();
        if (isPublicPage) startVisibilityDelays(quiz);
        document.querySelectorAll("[data-action]").forEach((element) => {
          element.addEventListener("click", (event) => {
            const action = element.dataset.action;
            if (action === "add-quiz") addQuiz();
            if (action === "select-admin-tab") {
              state.adminTab = element.dataset.tab || "home";
              render();
            }
            if (action === "select-builder-view") {
              state.builderView = element.dataset.builderView || "flow";
              render();
            }
            if (action === "open-stage-editor") {
              state.adminStage = Number(element.dataset.stage || 0);
              state.builderView = "page";
              render();
            }
            if (action === "select-quiz") {
              state.activeId = element.dataset.id;
              state.adminStage = 0;
              state.flowStage = "intro";
              state.previewStep = 0;
              state.answers = [];
              render();
            }
            if (action === "duplicate-quiz") duplicateQuiz(element.dataset.id);
            if (action === "remove-quiz") removeQuiz(element.dataset.id);
            if (action === "select-stage") {
              state.adminStage = Number(element.dataset.stage || 0);
              render();
            }
            if (action === "add-question") addQuestion();
            if (action === "remove-question") removeQuestion(Number(element.dataset.q));
            if (action === "add-option") addOption(Number(element.dataset.q));
            if (action === "remove-option") removeOption(Number(element.dataset.q), Number(element.dataset.o));
            if (action === "add-result") addResult();
            if (action === "remove-result") removeResult(Number(element.dataset.r));
            if (action === "remove-stage-component") removeStageComponent(element.dataset.componentId);
            if (action === "move-custom-up") moveStageComponent(element.dataset.componentId, -1);
            if (action === "move-custom-down") moveStageComponent(element.dataset.componentId, 1);
            if (action === "select-custom-component") {
              if (event.target.closest(".canvas-component-toolbar, .inline-video-editor, .inline-property-editor, .inline-timer-editor, input, textarea, select, [contenteditable='true']")) return;
              state.selectedComponentId = element.dataset.componentId;
              render();
            }
            if (action === "copy-link") copyLink();
            if (action === "checkout-click" || action === "preview-checkout-click") {
              const href = element.getAttribute("href");
              if (action === "checkout-click") recordCheckoutClick(quiz);
              if (action === "checkout-click" && href) window.open(href, "_blank", "noopener");
            }
            if (action === "clear-submissions") {
              const quizId = activeQuiz().id;
              state.submissions = state.submissions.filter((item) => item.quizId !== activeQuiz().id);
              state.funnel = state.funnel.filter((item) => item.quizId !== activeQuiz().id);
              saveSubmissions();
              saveFunnel();
              deleteRemoteQuizData(quizId);
              render();
            }
            if (action === "export-submissions") exportSubmissions(activeQuiz());
            if (action === "save-quiz") {
              saveQuizzes();
              window.clearTimeout(quizSyncTimer);
              element.disabled = true;
              element.textContent = "Publicando...";
              syncQuizDefinition(activeQuiz()).then(() => {
                element.textContent = state.remoteError ? "Erro ao publicar" : "Publicado";
                window.setTimeout(() => {
                  element.disabled = false;
                  element.textContent = "Salvar";
                }, 1400);
              });
            }
            if (action === "component-pick") {
              addStageComponent(element.dataset.component);
            }
            if (action === "preview-start" && !isPublicPage) {
              state.adminStage = Math.min(1, quiz.questions.length);
              render();
            } else if (action === "preview-start" || action === "start-quiz") {
              setCurrentRunIgnored(quiz, false);
              state.flowStage = "name";
              state.previewStep = 0;
              state.answers = [];
              state.submittedThisRun = false;
              render();
            }
            if (action === "preview-name-next" && !isPublicPage) {
              state.adminStage = Math.min(1, quiz.questions.length);
              render();
            } else if (action === "preview-name-next" || action === "name-next") {
              const nameInput = document.querySelector("[data-traveler-name]");
              const name = String(nameInput?.value || "").trim();
              if (!name) {
                nameInput?.focus();
                return;
              }
              state.lead = { ...state.lead, name };
              if (action === "name-next" && isTestName(name)) {
                setCurrentRunIgnored(quiz, true);
                removeCurrentFunnelRecord(quiz);
              } else if (action === "name-next") {
                setCurrentRunIgnored(quiz, false);
              }
              state.flowStage = "quiz";
              state.previewStep = 0;
              state.answers = [];
              state.submittedThisRun = false;
              render();
            }
            if (action === "preview-answer" && !isPublicPage) {
              state.adminStage = Math.min(state.adminStage + 1, quiz.questions.length + 1);
              render();
            } else if (action === "preview-answer" || action === "answer") {
              state.answers[state.previewStep] = Number(element.dataset.answer);
              if (state.previewStep >= quiz.questions.length - 1) {
                if (action === "answer") recordSubmission(quiz);
                state.flowStage = "loading";
                state.loadingProgress = 0;
              } else {
                state.previewStep += 1;
              }
              render();
            }
            if (action === "preview-reset" && !isPublicPage) {
              state.adminStage = 0;
              render();
            } else if (action === "preview-reset" || action === "reset-quiz") {
              state.flowStage = "intro";
              state.previewStep = 0;
              state.loadingProgress = 0;
              state.answers = [];
              state.submittedThisRun = false;
              state.lead = { name: "", email: "", phone: "" };
              setCurrentRunIgnored(quiz, false);
              render();
            }
            if (action) event.preventDefault();
          });
        });

        document.querySelectorAll("[data-field]").forEach((input) => {
