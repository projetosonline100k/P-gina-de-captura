            refreshAdminCanvas();
          });
        });

        document.querySelectorAll("[data-option]").forEach((input) => {
          input.addEventListener("input", () => {
            const [questionIndex, optionIndex] = input.dataset.option.split(":").map(Number);
            const option = activeQuiz().questions[questionIndex].options[optionIndex];
            option[input.dataset.okey] = input.dataset.okey === "weight" ? Number(input.value) : input.value;
            saveQuizzes();
            refreshAdminCanvas();
          });
        });

        document.querySelectorAll("[data-result]").forEach((input) => {
          input.addEventListener("focus", () => {
            state.adminResultIndex = Number(input.dataset.result);
            refreshAdminCanvas();
          });
          input.addEventListener("input", () => {
            const result = activeQuiz().results[Number(input.dataset.result)];
            result[input.dataset.rkey] = input.dataset.rkey === "bullets"
              ? input.value.split("\n").filter(Boolean)
              : input.value;
            saveQuizzes();
            refreshAdminCanvas();
          });
        });

        document.querySelectorAll("[data-stage-component]").forEach((input) => {
          input.addEventListener("input", () => {
            const components = activeQuiz().stageComponents?.[stageKey(activeQuiz())] || [];
            const component = components.find((item) => item.id === input.dataset.stageComponent);
            if (!component) return;
            component[input.dataset.componentKey] = input.value;
            saveQuizzes();
            refreshAdminCanvas();
          });
        });

        document.querySelectorAll("[data-timer-target]").forEach((input) => {
          input.addEventListener("change", () => {
            const components = activeQuiz().stageComponents?.[stageKey(activeQuiz())] || [];
            const timer = components.find((item) => item.id === input.dataset.timerTarget);
            if (!timer) return;
            timer.targetIds ||= [];
            if (input.checked && !timer.targetIds.includes(input.value)) timer.targetIds.push(input.value);
            if (!input.checked) timer.targetIds = timer.targetIds.filter((id) => id !== input.value);
            saveQuizzes();
          });
        });

        document.querySelectorAll("[data-timer-countdown]").forEach((input) => {
          input.addEventListener("change", () => {
            const components = activeQuiz().stageComponents?.[stageKey(activeQuiz())] || [];
            const timer = components.find((item) => item.id === input.dataset.timerCountdown);
            if (!timer) return;
            timer.showCountdown = input.checked;
            saveQuizzes();
            refreshAdminCanvas();
          });
        });

        document.querySelectorAll("[data-inline-component]").forEach((input) => {
          input.addEventListener("input", () => {
            const components = activeQuiz().stageComponents?.[stageKey(activeQuiz())] || [];
            const component = components.find((item) => item.id === input.dataset.inlineComponent);
            if (!component) return;
            component[input.dataset.componentKey] = input.matches("textarea, input, select") ? input.value : input.textContent;
            saveQuizzes();
          });
          if (input.matches("textarea, input, select")) input.addEventListener("change", refreshAdminCanvas);
          input.addEventListener("click", (event) => event.stopPropagation());
        });

        document.querySelectorAll("[data-custom-draggable]").forEach((component) => {
          component.addEventListener("dragstart", (event) => {
            if (event.target.closest("textarea, input, [contenteditable='true']")) {
              event.preventDefault();
              return;
            }
            event.stopPropagation();
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/custom-component-id", component.dataset.customDraggable);
            component.classList.add("is-dragging-component");
          });
          component.addEventListener("dragend", () => component.classList.remove("is-dragging-component"));
          component.addEventListener("dragover", (event) => {
            if (!event.dataTransfer.types.includes("text/custom-component-id")) return;
            event.preventDefault();
            event.stopPropagation();
            component.classList.add("component-drop-target");
          });
          component.addEventListener("dragleave", () => component.classList.remove("component-drop-target"));
          component.addEventListener("drop", (event) => {
            const draggedId = event.dataTransfer.getData("text/custom-component-id");
            if (!draggedId) return;
            event.preventDefault();
            event.stopPropagation();
            component.classList.remove("component-drop-target");
            reorderStageComponent(draggedId, component.dataset.customDraggable);
          });
        });

        document.querySelectorAll("[data-component-position]").forEach((zone) => {
          zone.addEventListener("dragover", (event) => {
            if (!event.dataTransfer.types.includes("text/custom-component-id")) return;
            event.preventDefault();
            event.stopPropagation();
            zone.classList.add("position-drop-active");
          });
          zone.addEventListener("dragleave", () => zone.classList.remove("position-drop-active"));
          zone.addEventListener("drop", (event) => {
            const id = event.dataTransfer.getData("text/custom-component-id");
            if (!id) return;
            event.preventDefault();
            event.stopPropagation();
            setStageComponentPosition(id, zone.dataset.componentPosition);
          });
        });

        document.querySelectorAll(".component-pill[draggable='true']").forEach((item) => {
          item.addEventListener("dragstart", (event) => {
            event.dataTransfer.effectAllowed = "copy";
            event.dataTransfer.setData("text/quiz-component", item.dataset.component);
            document.querySelector(".selected-outline")?.classList.add("drop-ready");
          });
          item.addEventListener("dragend", () => document.querySelector(".selected-outline")?.classList.remove("drop-ready", "drag-over"));
        });

        document.querySelectorAll("[data-stage-drop]").forEach((node) => {
          node.addEventListener("dragover", (event) => {
            if (!event.dataTransfer.types.includes("text/quiz-component")) return;
            event.preventDefault();
            event.stopPropagation();
            node.classList.add("stage-drop-active");
          });
          node.addEventListener("dragleave", () => node.classList.remove("stage-drop-active"));
          node.addEventListener("drop", (event) => {
            const type = event.dataTransfer.getData("text/quiz-component");
            if (!type) return;
            event.preventDefault();
            event.stopPropagation();
            state.adminStage = Number(node.dataset.stageDrop || 0);
            addStageComponent(type);
          });
        });

        const funnelMap = document.querySelector("[data-funnel-map]");
        if (funnelMap) {
          funnelMap.addEventListener("contextmenu", (event) => {
            if (event.target.closest(".funnel-node, button")) return;
            event.preventDefault();
            showFunnelContextMenu(event.clientX, event.clientY);
          });
          funnelMap.addEventListener("click", () => document.querySelector(".funnel-context-menu")?.remove());
        }

        const canvasDropZone = document.querySelector(".selected-outline");
        if (canvasDropZone) {
          canvasDropZone.addEventListener("dragover", (event) => {
            event.preventDefault();
            canvasDropZone.classList.add("drag-over");
          });
          canvasDropZone.addEventListener("dragleave", () => canvasDropZone.classList.remove("drag-over"));
          canvasDropZone.addEventListener("drop", (event) => {
            event.preventDefault();
            const type = event.dataTransfer.getData("text/quiz-component");
            canvasDropZone.classList.remove("drop-ready", "drag-over");
            if (type) addStageComponent(type);
          });
        }

        const leadForm = document.querySelector("[data-lead-form]");
        if (leadForm) {
          leadForm.addEventListener("input", () => {
            state.lead = Object.fromEntries(new FormData(leadForm).entries());
          });
        }
      }

      function showFunnelContextMenu(x, y) {
        document.querySelector(".funnel-context-menu")?.remove();
        const menu = document.createElement("div");
        menu.className = "funnel-context-menu";
        menu.style.left = `${x}px`;
        menu.style.top = `${y}px`;
        menu.innerHTML = `<strong>Adicionar ao funil</strong><button type="button">+ Nova pergunta</button>`;
        menu.querySelector("button").addEventListener("click", () => {
          menu.remove();
          addQuestion();
        });
        document.body.appendChild(menu);
      }

      function startLoading() {
        if (loadingTimer) return;
        loadingTimer = window.setInterval(() => {
          if (state.flowStage !== "loading") {
            window.clearInterval(loadingTimer);
            loadingTimer = null;
            return;
          }
          state.loadingProgress = Math.min(100, Math.round(state.loadingProgress + 100 / 6));
          if (state.loadingProgress >= 100) {
            window.clearInterval(loadingTimer);
            loadingTimer = null;
            state.flowStage = "result";
          }
          render();
        }, 1000);
      }

      function exportSubmissions(quiz) {
        const rows = quizSubmissions(quiz);
        const headers = ["data", "nome", "perfil", ...quiz.questions.map((_, index) => `pergunta_${index + 1}`)];
        const lines = [headers.join(",")].concat(rows.map((row) => {
          const values = [
            new Date(row.createdAt).toLocaleString("pt-BR"),
            row.travelerName || "",
            profileLabel(quiz, row.resultProfile),
            ...row.answers.map((answer, index) => quiz.questions[index]?.options[answer]?.text || "")
          ];
          return values.map((value) => `"${String(value).replace(/"/g, '""')}"`).join(",");
        }));
        const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${quiz.id}-respostas.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function icon(name) {
        return document.getElementById("icon-" + name)?.innerHTML || "";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, "&#096;");
      }

      render();
      window.addEventListener("resize", fitAdminCanvas);
    </script>
  </body>
</html>
